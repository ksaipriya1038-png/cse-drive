<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE-Drive.Tech</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .welcome-box { background:white;padding:50px 40px;border-radius:16px;width:100%;max-width:500px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);text-align:center;animation:fadeIn 0.8s ease-in-out;
        }
        .welcome-box h2 { font-size: 2rem; color: #1e293b; margin-bottom: 10px;
        }
        .welcome-box p { color: #64748b; margin-bottom: 30px; font-size: 1.05rem;
        }
        .btn-group { display: flex; gap: 20px; justify-content: center;
        }
        .welcome-btn { flex:1;padding:14px;font-size:1.1rem;font-weight:bold;border:none;border-radius:8px;
             cursor:pointer;transition:transform 0.2s; background:0.2s;text-decoration:none;display:inline-block;
        }
        .btn-login { background: #2a5298; color: white !important;
        }
        .btn-login:hover { background: #1e3c72; transform: translateY(-2px);
        }
        .btn-register { background: #27ae60; color: white !important;
        }
        .btn-register:hover { background: #219653; transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="bubble-area">
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
    </div>
    <header >
       <div class="logo">CSE Drive</div>
    </header>
    <div class="auth-container">
        <div class="welcome-box">
            <h2>Welcome to CSE Drive</h2>
            <p>Connect with your friends.</p>
            <div class="btn-group">
                <a href="login.html" class="welcome-btn btn-login">Student Login</a>
                <a href="register.html" class="welcome-btn btn-register">Register</a>
            </div>
        </div>
    </div>
    <footer>
        <h4>Made with 🧡 by priya | © 2026 CSE Drive. All Rights Reserved.</h4>
    </footer>
</body>
</html>
