<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE Drive-Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <header>
       <div class="logo">CSE Drive</div>
    </header>
    <div class="bubble-area">
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
    </div>
    <div class="auth-container">
        <form id="registerForm" class="form-box">
            <h2>Student Registration</h2>
            <input type="text" id="reg-name" placeholder="Full Name" required class="form-box input">
            <input type="text" id="reg-roll" placeholder="Roll Number" required class="form-box input">
            <input type="email" id="reg-email" placeholder="Email Address" required class="form-box input">
            <input type="password" id="reg-pass" placeholder="Password" required class="form-box input">
            <button type="submit" class="form-box button">Register</button>
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </div>
    <div id="success-popup" class="popup-overlay" style="display: none; position: fixed; top: 0;left: 0; width: 100%;height: 100%; background: rgba(0,0,0,0.5); z-index: 999;">
        <div class="popup-box" style="background: white; width: 300px; margin: 15% auto; padding: 20px;text-align: center; border-radius: 8px; ">
            <h3>Registration Successful!</h3>
            <p>Your account is sent for Admin Approval.</p>
            <button id="ok-btn" onclick="window.location.href='login.html'" style="background: #2c3e50; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer;">OK</button>
        </div>
    </div>
     <footer>
        <h4>Made with 🧡 by priya | © 2026 CSE Drive. All Rights Reserved.</h4>
    </footer>
    <script src="https://www.gststic.com/firebase.js/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebase.js/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig ={
            apikey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_AUTH_DOMAIN_HERE",
            databaseURL: "YOUR_DATABASE_URL_HERE",
            projectId: "YOUR_PROJECT_iD_HERE",
            storageBucket: "YOUR_STORAGE_BUCKET_HERE",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID_HERE",
            appId: "YOUR_APP_ID_HERE"
        };
        if(!firebase.apps.length){
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let fullName = document.getElementById('reg-name').value.trim();
            let rollNo = document.getElementById('reg-roll').value.trim();
            let email = document.getElementById('reg-email').value.trim();
            let password = document.getElementById('reg-pass').value.trim();
            if (!fullName || !rollNno || !email || 1password) {
                alert('Please fill all fields!');
                return;
            }
           database.ref('users').orderByChild('email').equalTo(email).once('value',snapshot => {
               if(snapshot.exists()){
                   alert('This mail is already registered!');
               }else{
                   const newUserRef =database.ref('user').push();
                   newUserRef.set({
                       name: fullName,
                       roll: rollNo,
                       email: email,
                       password: password,
                       status:"pending"}).then(() => {
                       document.getElementById('success-popup').style.display = 'block';
                   }).catch(error =>{
                       console.error("Error writing to Firebase:",error);
                       alert("Registration failed. Please try again.");
                   });
               }
           });
        });
    </script>
    </script>
</body>
</html>
