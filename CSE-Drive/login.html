<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE Drive-Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<header>
    <div class="logo">CSE Drive</div>
</header>
<body>
    <div class="bubble-area">
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
        <div class="float-text">CSE Drive</div>
    </div>
    <div class="auth-container">
        <form id="loginForm" class="form-box">
            <h2>Login</h2>
            <select id="role-select" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="student">Student</option>
                <option value="admin">Admin</option>
            </select>
            <input type="text" id="username" placeholder="Username / Email" required class="form-box input">
            <input type="password" id="password" placeholder="Password" required class="form-box input">
            <button type="submit" class="form-box button">Login</button>
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </form>
    </div>
    <footer>
        <h4>Made with 🧡 by priya | © 2026 CSE Drive. All Rights Reserved.</h4>
    </footer>
     <script src="https://www.gststic.com/firebase.js/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebase.js/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig ={
            apikey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_iD",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        if(!firebase.apps.length){
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        window.onload = function(){
            if(localstorage.getItem("isLoggedIn") === "true"){
                window.location.href = "class directory.html";
            }
        };
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let role = document.getElementById('role-select').value;
        let userEmail = document.getElementById('username').value.trim();
        let pass = document.getElementById('password').value.trim();
        if (role === 'admin') {
            if (userEmail === 'admin' && pass === 'admin1038') {
                alert('Admin Login Successful!');
                window.location.replace('admin.html');
            } else {
                alert('Invalid Admin Credentials!');
            }
        } else {
            database.ref('users').orderByChild('email').equalto(userEmail).once('value', snapshot => {
            if (snapshot.exists()) {
                let userFound = false;
                snapshot.forEach(childSnapshot =>{
                    let  userData = childSnapshot.val();
                    if(userData.password = pass){
                    userFound = true;
                    if(userData.status === 'approved'){
                        alert('Student Login successful!');
                        localStorage.setItem("isLoggedIn","true");
                        window.location.href = 'class directory.html';
                    } else if(userData.status === 'pending'){
                        alert('Your account is pending admin approval!');
                    }
                }
            });
                if(userFound){
                    alert('Incorrect password! Please try again.');
                }
            }else{
                alert('Account not found! Please check credentials or register.');
            }
            }).catch(error => {
                console.error(error);
                alert("Server error during login authentication.");
            });
        }
    });
    </script>
</body>
</html>
