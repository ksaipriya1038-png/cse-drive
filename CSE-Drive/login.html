<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // TODO: Replace with your actual Firebase config keys
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    databaseURL: "https://cse-drive-8a583-default-rtdb.firebaseio.com/",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const database = firebase.database();

  window.onload = function() {
    if (localStorage.getItem("isLoggedIn") === "true") {
      window.location.href = "class directory.html";
    }
  };

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    let role = document.getElementById('role-select').value;
    let userEmail = document.getElementById('username').value.trim();
    let pass = document.getElementById('password').value.trim();

    if (role === 'admin') {
      if (userEmail === 'admin' && pass === 'admin123') {
        alert('Admin Login Successful!');
        window.location.replace('admin.html');
      } else {
        alert('Invalid Admin Credentials!');
      }
    } else {
      // Direct Live Check from cloud database
      database.ref('users').orderByChild('email').equalTo(userEmail).once('value', snapshot => {
        if (snapshot.exists()) {
          let userFound = false;
          snapshot.forEach(childSnapshot => {
            let userData = childSnapshot.val();
            if (userData.password === pass) {
              userFound = true;
              if (userData.status === 'approved') {
                alert('Student Login Successful!');
                localStorage.setItem("isLoggedIn", "true");
                window.location.href = 'class directory.html';
              } else {
                alert('Your account is pending admin approval!');
              }
            }
          });
          if (!userFound) alert('Incorrect password!');
        } else {
          alert('Account not found! Register first.');
        }
      }).catch(error => {
        alert("Database connection error: " + error.message);
      });
    }
  });
</script>
