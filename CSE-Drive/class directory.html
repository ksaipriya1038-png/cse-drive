        function displayCards(users) {
            let grid = document.getElementById('friendsGrid');
            grid.innerHTML = '';
            users.forEach(user => {
                let skillsHTML = '';
                if (user.skills && Array.isArray(user.skills)) {
                    user.skills.forEach(skill => {
                        skillsHTML += `<span class="skill-badge">${skill}</span>`;
                    });
                } else {
                    skillsHTML = `<span class="skill-badge">HTML</span><span class="skill-badge">CSS</span>`;
                }
                let userImg = user.image || 'images/default.png';
                let card = `
                    <div class="student-card">
                        <div class="card-img-container">
                            <img src="${userImg}" alt="${user.name}" onerror="this.src='https://via.placeholder.com/150'">
                        </div>
                        <h2 class="friend-name">${user.name}</h2>
                        <p class="roll-no">Roll no: ${user.roll || 'N/A'}</p>
                        <div class="details-section">
                            <p><strong>Father:</strong> ${user.father || 'N/A'}</p>
                            <p><strong>Mother:</strong> ${user.mother || 'N/A'}</p>
                            <p><strong>Mobile:</strong> ${user.mobile || 'N/A'}</p>
                        </div>
                        <div class="skills-container">
                            ${skillsHTML}
                        </div>
                        <div class="social-links">
                            <a href="${user.instagram || '#'}" target="_blank" class="instagram">Instagram</a>
                            <a href="${user.github || '#'}" target="_blank" class="github">GitHub</a>
                            <a href="${user.linkedin || '#'}" target="_blank" class="linkedin">LinkedIn</a>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }
        function searchFunction() {
            let input = document.getElementById('searchFriend').value.toLowerCase();
            let cards = document.getElementsByClassName('student-card');
            for (let i = 0; i < cards.length; i++) {
                let nameElement = cards[i].getElementsByClassName('friend-name')[0];
                let name = nameElement ? nameElement.innerText.toLowerCase() : '';
                if (name.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
